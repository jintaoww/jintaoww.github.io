{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  (function() {
    var root = document.documentElement;
    var theme = "{{ site.site_theme | default: 'light' }}";

    try {
      var savedTheme = localStorage.getItem("theme-mode");
      if (savedTheme === "dark" || savedTheme === "light") {
        theme = savedTheme;
      }
    } catch (error) {}

    root.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
    root.className = root.className.replace(/\bno-js\b/g, '') + ' js ';
  })();
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">
